<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Alta de Libro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h3>Nuevo Libro</h3>
        </div>
        <div class="card-body">
            <form th:action="@{/altaLibro}" th:object="${libro}" method="post">
                <div class="mb-3">
                    <label class="form-label">Título:</label>
                    <input type="text" th:field="*{titulo}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Autor:</label>
                    <input type="text" th:field="*{autor}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">ISBN:</label>
                    <input type="text" th:field="*{isbn}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Año de Publicación:</label>
                    <input type="number" th:field="*{anioPublicacion}" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-success">Guardar Libro</button>
                <a href="/inicio" class="btn btn-danger">Cancelar</a>
            </form>
        </div>
    </div>
</body>
</html>
