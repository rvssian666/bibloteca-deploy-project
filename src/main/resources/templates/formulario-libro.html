<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Alta de Libro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/inicio">Biblioteca</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/listadoLibro">Libros</a></li>
                    <li class="nav-item"><a class="nav-link" href="/listadoSocio">Socios</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h3>Nuevo Libro</h3>
            </div>
            <div class="card-body">
                <form th:action="@{/altaLibro}" th:object="${libro}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Título:</label>
                        <input type="text" th:field="*{titulo}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Autor:</label>
                        <input type="text" th:field="*{autor}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">ISBN:</label>
                        <input type="text" th:field="*{isbn}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Año de Publicación:</label>
                        <input type="number" th:field="*{anioPublicacion}" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-success">Guardar Libro</button>
                    <a href="/inicio" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>

    <footer class="text-center mt-5 py-4 border-top">
        <p class="text-muted">&copy; 2026 — Alexander Fuentes Valladares</p>
    </footer>
</body>
</html>
