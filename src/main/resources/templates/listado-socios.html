<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de Socios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Registro de Socios</h2>
        <a href="/altaSocio" class="btn btn-success">Nuevo Socio</a>
    </div>

    <table class="table table-hover shadow-sm">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Apellidos</th>
                <th>DNI</th>
                <th>Fecha de Alta</th>
            </tr>
        </thead>
        <tbody>
            <!-- 'listaSocios' es el nombre que pusimos en el model.addAttribute del controlador -->
            <tr th:each="socio : ${listaSocios}">
                <td th:text="${socio.id}"></td>
                <td th:text="${socio.nombre}"></td>
                <td th:text="${socio.apellidos}"></td>
                <td th:text="${socio.dni}"></td>
                <td th:text="${socio.fechaAlta}"></td>
            </tr>
        </tbody>
    </table>
    
    <div class="mt-3">
        <a href="/inicio" class="btn btn-outline-secondary">Volver al Inicio</a>
    </div>
</body>
</html>
