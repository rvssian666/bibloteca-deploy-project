<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de Socios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/inicio">Biblioteca</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/listadoLibro">Libros</a></li>
                    <li class="nav-item"><a class="nav-link" href="/listadoSocio">Socios</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Registro de Socios</h2>
            <a href="/altaSocio" class="btn btn-primary">Nuevo Socio</a>
        </div>

        <table class="table table-striped">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Apellidos</th>
                    <th>DNI</th>
                    <th>Fecha de Alta</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="socio : ${listaSocios}">
                    <td th:text="${socio.id}"></td>
                    <td th:text="${socio.nombre}"></td>
                    <td th:text="${socio.apellidos}"></td>
                    <td th:text="${socio.dni}"></td>
                    <td th:text="${socio.fechaAlta}"></td>
                </tr>
            </tbody>
        </table>

        <div class="mt-3">
            <a href="/inicio" class="btn btn-outline-secondary">Volver al Inicio</a>
        </div>
    </div>

    <footer class="text-center mt-5 py-4 border-top">
        <p class="text-muted">&copy; 2026 — Alexander Fuentes Valladares</p>
    </footer>
</body>
</html>
