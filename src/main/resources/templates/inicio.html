<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inicio - Biblioteca</title>
    <!-- Bootstrap para cumplir el punto de diseño de la rúbrica -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hero-section { padding: 60px 0; background-color: #e9ecef; border-radius: 15px; }
        .profile-img { width: 200px; height: 200px; object-fit: cover; border: 5px solid white; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <!-- Barra de navegación para movernos por la app -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/inicio">Biblioteca </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/listadoLibro">Libros</a></li>
                    <li class="nav-item"><a class="nav-link" href="/listadoSocio">Socios</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="hero-section text-center">
            <!-- REQUISITO: Tu foto (puedes poner una en src/main/resources/static/img/perfil.jpg) -->
            <img src="https://images.unsplash.com/photo-1613253932202-686cbcd993b0?q=80&w=1160&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" class="rounded-circle profile-img mb-4" alt="Foto ">
            
            
            <h1 class="display-4">UT8 - Programación</h1>
            <h2 class="text-secondary">Alexander Fuentes Valladares</h2>
            <p class="lead mt-3">Gestión de Biblioteca: Libros y Socios con Spring Boot y JPA.</p>
            
            <hr class="my-4">

            
            <div class="row mt-5">
                <div class="col-md-3">
                    <a th:href="@{/listadoLibro}" class="btn btn-outline-primary w-100 py-3">Listado de Libros</a>
                </div>
                <div class="col-md-3">
                    <a th:href="@{/listadoSocio}" class="btn btn-outline-success w-100 py-3">Listado de Socios</a>
                </div>
                <div class="col-md-3">
                    <a th:href="@{/altaLibro}" class="btn btn-primary w-100 py-3">Alta de Libro</a>
                </div>
                <div class="col-md-3">
                    <a th:href="@{/altaSocio}" class="btn btn-success w-100 py-3">Alta de Socio</a>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center mt-5 py-4 border-top">
        <p class="text-muted">&copy; 2026 — Alexander Fuentes Valladares</p>
    </footer>

</body>
</html>
