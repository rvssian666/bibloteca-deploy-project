<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Alta de Socio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-success">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0">Registrar Nuevo Socio</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/altaSocio}" th:object="${socio}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Nombre:</label>
                            <input type="text" th:field="*{nombre}" class="form-control" placeholder="Ej: Juan" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Apellidos:</label>
                            <input type="text" th:field="*{apellidos}" class="form-control" placeholder="Ej: Pérez García" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">DNI:</label>
                            <input type="text" th:field="*{dni}" class="form-control" placeholder="12345678X" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Fecha de Alta:</label>
                            <!-- El tipo 'date' ayuda a que el usuario no se equivoque de formato -->
                            <input type="date" th:field="*{fechaAlta}" class="form-control" required>
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success">Confirmar Alta</button>
                            <a href="/listadoSocio" class="btn btn-light border">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
