<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Alta de Socio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/inicio">Biblioteca</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/listadoLibro">Libros</a></li>
                    <li class="nav-item"><a class="nav-link" href="/listadoSocio">Socios</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Registrar Nuevo Socio</h4>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/altaSocio}" th:object="${socio}" method="post">
                            <div class="mb-3">
                                <label class="form-label">Nombre:</label>
                                <input type="text" th:field="*{nombre}" class="form-control" placeholder="Ej: Juan" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Apellidos:</label>
                                <input type="text" th:field="*{apellidos}" class="form-control" placeholder="Ej: Pérez García" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">DNI:</label>
                                <input type="text" th:field="*{dni}" class="form-control" placeholder="12345678X" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Fecha de Alta:</label>
                                <input type="date" th:field="*{fechaAlta}" class="form-control" required>
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-success">Confirmar Alta</button>
                                <a href="/listadoSocio" class="btn btn-secondary">Cancelar</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center mt-5 py-4 border-top">
        <p class="text-muted">&copy; 2026 — Alexander Fuentes Valladares</p>
    </footer>
</body>
</html>
