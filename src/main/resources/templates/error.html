<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Error - Biblioteca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .error-container { margin-top: 100px; text-align: center; }
        .error-code { font-size: 120px; font-weight: bold; color: #dc3545; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/inicio">Biblioteca</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/listadoLibro">Libros</a></li>
                    <li class="nav-item"><a class="nav-link" href="/listadoSocio">Socios</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container error-container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="error-code">⚠️</div>
                <h1 class="display-4">¡Ups! Algo salió mal</h1>
                <p class="lead">Lo sentimos, la página que buscas no está disponible o ha ocurrido un error inesperado.</p>
                <hr>
                <p>Verifica la URL o intenta volver al inicio.</p>
                <a href="/inicio" class="btn btn-outline-secondary btn-lg">Volver al Inicio</a>
            </div>
        </div>
    </div>

    <footer class="text-center mt-5 py-4 border-top">
        <p class="text-muted">&copy; 2026 — Alexander Fuentes Valladares</p>
    </footer>

</html>
